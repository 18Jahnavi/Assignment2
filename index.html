<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Hackathon Registration Form</title>

  <link rel="stylesheet" href="style.css">

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >
</head>

<body>

  <!-- Background Circles -->

  <div class="circle circle1"></div>
  <div class="circle circle2"></div>
  <div class="circle circle3"></div>

  <!-- Main Container -->

  <div class="container">

    <!-- Heading -->

    <h1>
      🚀 Hackathon Registration Form
    </h1>

    <p class="subtitle">
      Register for the innovation challenge and showcase your skills.
    </p>

    <!-- Progress Percentage -->

    <div class="progress-text">
      <span id="progressPercent">
        25% Completed
      </span>
    </div>

    <!-- Progress Bar -->

    <div class="progress-container">

      <div
        class="progress-bar"
        id="progressBar"
      ></div>

    </div>

    <!-- Step Indicator -->

    <div class="step-indicator">

      <div class="step active-step">
        1
      </div>

      <div class="step">
        2
      </div>

      <div class="step">
        3
      </div>

      <div class="step">
        4
      </div>

    </div>

    <!-- Form -->

    <form id="multiStepForm">

      <!-- STEP 1 -->

      <div class="form-step active">

        <h2>
          Personal Information
        </h2>

        <div class="input-group">

          <label for="fullName">
            Full Name
          </label>

          <input
            type="text"
            id="fullName"
            aria-label="Full Name"
            placeholder="Enter your full name"
          >

          <small
            class="error"
            id="nameError"
          ></small>

        </div>

        <div class="input-group">

          <label for="dob">
            Date of Birth
          </label>

          <input
            type="date"
            id="dob"
            aria-label="Date of Birth"
          >

          <small
            class="error"
            id="dobError"
          ></small>

        </div>

        <div class="input-group">

          <label for="gender">
            Gender
          </label>

          <select
            id="gender"
            aria-label="Gender"
          >
            <option value="">
              Select Gender
            </option>

            <option>
              Male
            </option>

            <option>
              Female
            </option>

            <option>
              Other
            </option>

          </select>

          <small
            class="error"
            id="genderError"
          ></small>

        </div>

        <button
          type="button"
          class="next-btn"
        >
          Next →
        </button>

      </div>

      <!-- STEP 2 -->

      <div class="form-step">

        <h2>
          Contact & Team Details
        </h2>

        <div class="input-group">

          <label for="email">
            Email Address
          </label>

          <input
            type="email"
            id="email"
            placeholder="Enter your email"
          >

          <small
            class="error"
            id="emailError"
          ></small>

        </div>

        <div class="input-group">

          <label for="phone">
            Phone Number
          </label>

          <input
            type="text"
            id="phone"
            placeholder="10-digit phone number"
          >

          <small
            class="error"
            id="phoneError"
          ></small>

        </div>

        <div class="input-group">

          <label for="teamName">
            Team Name
          </label>

          <input
            type="text"
            id="teamName"
            placeholder="Enter team name"
          >

        </div>

        <div class="input-group">

          <label for="teamSize">
            Team Size
          </label>

          <select id="teamSize">

            <option value="">
              Select Team Size
            </option>

            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5</option>

          </select>

        </div>

        <div class="input-group">

          <label for="role">
            Role in Team
          </label>

          <select id="role">

            <option value="">
              Select Role
            </option>

            <option>
              Developer
            </option>

            <option>
              Designer
            </option>

            <option>
              Tester
            </option>

            <option>
              Team Lead
            </option>

          </select>

        </div>

        <div class="buttons">

          <button
            type="button"
            class="prev-btn"
          >
            ← Previous
          </button>

          <button
            type="button"
            class="next-btn"
          >
            Next →
          </button>

        </div>

      </div>

      <!-- STEP 3 -->

      <div class="form-step">

        <h2>
          Hackathon Preferences
        </h2>

        <div class="input-group">

          <label for="track">
            Track Preference
          </label>

          <select id="track">

            <option value="">
              Select Track
            </option>

            <option>AI</option>
            <option>Web</option>
            <option>IoT</option>
            <option>Open</option>

          </select>

        </div>

        <div class="input-group">

          <label for="shirt">
            T-Shirt Size
          </label>

          <select id="shirt">

            <option value="">
              Select Size
            </option>

            <option>S</option>
            <option>M</option>
            <option>L</option>
            <option>XL</option>

          </select>

        </div>

        <div class="input-group">

          <label for="diet">
            Dietary Restrictions
          </label>

          <textarea
            id="diet"
          ></textarea>

        </div>

        <div class="input-group">

          <label for="notes">
            Additional Notes
          </label>

          <textarea
            id="notes"
          ></textarea>

        </div>

        <div class="buttons">

          <button
            type="button"
            class="prev-btn"
          >
            ← Previous
          </button>

          <button
            type="button"
            class="next-btn"
          >
            Next →
          </button>

        </div>

      </div>

      <!-- STEP 4 -->

      <div class="form-step">

        <h2>
          Review & Submit
        </h2>

        <div id="summary"></div>

        <div class="buttons">

          <button
            type="button"
            class="prev-btn"
          >
            ← Previous
          </button>

          <button
            type="submit"
            class="submit-btn"
          >
            Submit Registration 🚀
          </button>

        </div>

      </div>

    </form>

  </div>

  <!-- Success Modal -->

  <div
    class="success-modal"
    id="successModal"
  >

    <div class="modal-content">

      <h2>
        🎉 Registration Successful!
      </h2>

      <p>
        Thank you for registering.
      </p>

      <button id="closeModal">
        Close
      </button>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
